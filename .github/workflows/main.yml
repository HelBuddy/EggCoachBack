name: Build, Push Docker Image, and Deploy to EC2

on:
  push:
    branches:
      - dev

jobs:
  build_push:
    runs-on: ubuntu-latest  # Ubuntu 환경에서 실행

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up JDK 21
      uses: actions/setup-java@v2
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/wrapper-validation-action@v1
      with:
        gradle-version: '8.13'
        distribution: 'https://services.gradle.org/distributions/gradle-8.13-bin.zip'

    - name: Build Spring Boot JAR using Gradle
      run: ./gradlew clean build -x test  # Gradle을 사용하여 JAR 파일 빌드 (테스트는 생략)

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}  # Docker Hub 사용자명
        password: ${{ secrets.DOCKER_TOKEN }}  # Docker Hub 비밀번호

    - name: Build Docker image
      run: | 
         docker build -t acoursove2/eggcoachback:latest .

    - name: Push Docker image to Docker Hub
      run: |
        docker push acoursove2/eggcoachback:latest

  deploy:  # 주석 처리된 build_push 작업과 구분
    runs-on: ubuntu-latest
    needs: build_push
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa  # SSH 키에 적절한 권한 설정

      - name: Add EC2 to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.AWS_EC2_IP }} >> ~/.ssh/known_hosts

      - name: SSH into EC2 and deploy with Podman
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.AWS_EC2_IP }} << EOF
            sudo podman pull ${{ secrets.DOCKER_USERNAME }}/eggcoachback:latest
            sudo podman stop eggcoachback || true
            sudo podman rm eggcoachback || true
            sudo podman run -d --name eggcoachback -p 8080:8080 \
              -e PROFILE=${{ vars.PROFILE }} \
              -e MYSQL_URL=${{ secrets.RDS_IP }} \
              -e MYSQL_USERNAME=${{ secrets.RDS_USERNAME }} \
              -e MYSQL_PASSWORD=${{ secrets.RDS_PASSWORD }} \
              -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              -e KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }} \
              -e KAKAO_CLIENT_NAME=${{ secrets.KAKAO_CLIENT_NAME }} \
              -e KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }} \
              -e KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }} \
              -e NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }} \
              -e NAVER_CLIENT_NAME=${{ secrets.NAVER_CLIENT_NAME }} \
              -e NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }} \
              -e NAVER_REDIRECT_URI=${{ secrets.NAVER_REDIRECT_URI }} \
              -e ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
              ${{ secrets.DOCKER_USERNAME }}/eggcoachback:latest
          EOF
